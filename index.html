<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Carta del Mar</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="backdrop">
        <div class="shape shape-a"></div>
        <div class="shape shape-b"></div>
        <div class="shape shape-c"></div>
    </div>

    <main class="page">
        <section class="card intro" aria-live="polite">
            <p class="kicker">13 de marzo de 2026</p>
            <h1>Un detalle del mar</h1>
            <figure class="arch-illustration" aria-label="Ilustracion del mar">
                <svg viewBox="0 0 260 140" role="img" aria-hidden="true">
                    <path d="M0,70 Q65,20 130,70 T260,70 V140 H0 Z" fill="#00bcd4" opacity="0.3"/>
                    <path d="M0,80 Q65,30 130,80 T260,80 V140 H0 Z" fill="#4dd0e1" opacity="0.4"/>
                    <path d="M0,90 Q65,40 130,90 T260,90 V140 H0 Z" fill="#80deea" opacity="0.5"/>
                    <!-- Peces simples -->
                    <circle cx="50" cy="50" r="3" fill="#ffffff"/>
                    <circle cx="55" cy="50" r="2" fill="#ffffff"/>
                    <circle cx="150" cy="60" r="3" fill="#ffffff"/>
                    <circle cx="155" cy="60" r="2" fill="#ffffff"/>
                </svg>
                <figcaption>Para mi amor del océano.</figcaption>
            </figure>
            <p class="muted">Abre la carta del mar para leer el mensaje, mi amor.</p>
            <div class="letter-shell">
                <div class="actions">
                    <button id="openLetterBtn" class="primary" type="button" aria-expanded="false"
                        aria-controls="letterContent">Abrir carta</button>
                </div>
                <div id="letterContent" class="letter-content hidden" hidden>
                    <p>sss</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
